syntax = "proto3";

package order;

option go_package = "github.com/username/dist-ecommerce-go/proto/order";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse) {}
  rpc GetOrder(GetOrderRequest) returns (OrderResponse) {}
}

message OrderItem {
  string product_id = 1;
  int32 quantity = 2;
  double unit_price = 3;
}

message Order {
  string id = 1;
  string user_id = 2;
  double total_price = 3;
  string status = 4;
  repeated OrderItem items = 5;
  string created_at = 6;
}

message CreateOrderRequest {
  string user_id = 1;
  repeated OrderItem items = 2;
}

message GetOrderRequest {
  string id = 1;
}

message OrderResponse {
  Order order = 1;
}
