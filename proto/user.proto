syntax = "proto3";

package user;

option go_package = "github.com/username/dist-ecommerce-go/proto/user";

service UserService {
  rpc GetUser(GetUserRequest) returns (UserResponse) {}
  rpc CreateUser(CreateUserRequest) returns (UserResponse) {}
  rpc ValidateUser(ValidateUserRequest) returns (ValidateUserResponse) {}
}

message User {
  string id = 1;
  string email = 2;
  string full_name = 3;
}

message GetUserRequest {
  string id = 1;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
}

message UserResponse {
  User user = 1;
}

message ValidateUserRequest {
  string email = 1;
  string password = 2;
}

message ValidateUserResponse {
  bool valid = 1;
  User user = 2;
}
